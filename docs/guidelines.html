  <h1>LoveKey 使用指南</h1>
  <p>1. 在 LINE、Instagram 或 iMessage 複製對方訊息。</p>
  <p>2. 開啟 LoveKey 鍵盤，貼上訊息，選擇語氣與目的。</p>
  <p>3. 檢查生成內容，確認符合你的語氣後再貼上送出。</p>
  <p>鍵盤需要完整取用才能傳送你主動貼上的內容。請不要貼上不願意交給 AI 處理的私人資料。</p>
  <p><a href="./">查看隱私政策</a></p>
