workflows:
  lovekey-ios-simulator-qa:
    name: LoveKey iOS Simulator QA
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/Library/Caches/CocoaPods
    scripts:
      - name: Run LoveKey iOS Simulator QA
        script: |
          bash scripts/codemagic_ios_simulator_qa.sh
        test_report: build/qa/flutter-tests.json
    artifacts:
      - build/ios/iphonesimulator/*.app
      - build/qa/**
      - /tmp/xcodebuild_logs/*.log
