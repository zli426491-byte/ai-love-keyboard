name: iOS Release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Inject runtime AI proxy config
        env:
          AI_PROXY_URL: ${{ secrets.AI_PROXY_URL }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          proxy_url = os.environ.get("AI_PROXY_URL", "").strip().rstrip("/")
          if not proxy_url:
              raise SystemExit("AI_PROXY_URL secret is empty; deploy the Cloudflare Worker before uploading a build.")

          path = Path("ios/LoveKeyboard/KeyboardViewController.swift")
          text = path.read_text(encoding="utf-8")
          text = text.replace("__AI_PROXY_URL__", proxy_url)
          if "__AI_PROXY_URL__" in text:
              raise SystemExit("AI_PROXY_URL placeholder was not replaced.")
          path.write_text(text, encoding="utf-8")
          print("Runtime AI proxy config injected into LoveKeyboard extension.")
          PY

      - name: Setup App Store Connect API Key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" > ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

      - name: Install Codemagic CLI tools
        run: |
          pipx install codemagic-cli-tools

      - name: Setup signing
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          CERTIFICATE_PRIVATE_KEY: ${{ secrets.CERTIFICATE_PRIVATE_KEY }}
        run: |
          export APP_STORE_CONNECT_PRIVATE_KEY=$(cat ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8)

          app-store-connect fetch-signing-files "com.ailovekeyboard.app" \
            --type IOS_APP_STORE \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --certificate-key "$CERTIFICATE_PRIVATE_KEY" \
            --create

          app-store-connect fetch-signing-files "com.ailovekeyboard.app.keyboard" \
            --type IOS_APP_STORE \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --certificate-key "$CERTIFICATE_PRIVATE_KEY" \
            --create

          keychain initialize
          keychain add-certificates
          xcode-project use-profiles --project ios/Runner.xcodeproj --export-options-plist ios/ExportOptions.generated.plist

      - name: Set build number
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          export APP_STORE_CONNECT_PRIVATE_KEY=$(cat ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8)
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "6764681086" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" || echo 0)
          cd ios
          agvtool new-version -all $((LATEST_BUILD + 1))

      - name: Build iOS
        env:
          AI_PROXY_URL: ${{ secrets.AI_PROXY_URL }}
        run: |
          flutter build ipa \
            --release \
            --dart-define=AI_PROXY_URL="$AI_PROXY_URL" \
            --export-options-plist=ios/ExportOptions.generated.plist

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          export APP_STORE_CONNECT_PRIVATE_KEY=$(cat ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8)
          app-store-connect publish \
            --path build/ios/ipa/*.ipa \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
