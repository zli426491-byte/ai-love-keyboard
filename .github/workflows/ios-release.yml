name: iOS Release

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: '輸入 UPLOAD_TESTFLIGHT 才會執行發布'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ios-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-ios:
    runs-on: macos-26
    timeout-minutes: 90

    steps:
      - name: Confirm intentional TestFlight release
        env:
          RELEASE_CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          if [ "$RELEASE_CONFIRMATION" != "UPLOAD_TESTFLIGHT" ]; then
            echo "Release confirmation did not match UPLOAD_TESTFLIGHT." >&2
            exit 1
          fi
          echo "Release ref: $GITHUB_REF_NAME"
          echo "Release commit: $GITHUB_SHA"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify RevenueCat LoveKey offering
        env:
          REVENUECAT_IOS_PUBLIC_KEY: ${{ secrets.REVENUECAT_IOS_PUBLIC_KEY }}
        run: |
          python3 -m unittest tools.tests.test_check_revenuecat_offering
          python3 tools/check_revenuecat_offering.py

      - name: Validate P0 release invariants
        run: |
          test -f lib/services/account_service.dart || {
            echo "Missing authenticated account service; refusing to publish a regressed build." >&2
            exit 1
          }
          grep -q 'X-Request-Signature' ios/LoveKeyboard/KeyboardViewController.swift || {
            echo "Keyboard request signature metadata is missing." >&2
            exit 1
          }
          grep -q 'Authorization' ios/LoveKeyboard/KeyboardViewController.swift || {
            echo "Keyboard authorization header is missing." >&2
            exit 1
          }
          if grep -R -n -E 'sk-(proj-)?[A-Za-z0-9_-]{20,}' lib ios; then
            echo "Potential OpenAI secret found in client source." >&2
            exit 1
          fi

      - name: Full Flutter and iOS Simulator QA gate
        env:
          REQUIRE_IOS: '1'
          RUN_INTEGRATION: '1'
        run: |
          bash scripts/ios_qa.sh
          FLUTTER_BIN=flutter bash scripts/dialogue_eval.sh
          FLUTTER_BIN=flutter bash scripts/ui_audit.sh

      - name: Inject runtime AI proxy config
        env:
          AI_PROXY_URL: ${{ secrets.AI_PROXY_URL }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          proxy_url = os.environ.get("AI_PROXY_URL", "").strip().rstrip("/")
          if not proxy_url:
              raise SystemExit("AI_PROXY_URL secret is empty; deploy the Cloudflare Worker before uploading a build.")

          path = Path("ios/LoveKeyboard/KeyboardViewController.swift")
          text = path.read_text(encoding="utf-8")
          text = text.replace("__AI_PROXY_URL__", proxy_url)
          if "__AI_PROXY_URL__" in text:
              raise SystemExit("AI_PROXY_URL placeholder was not replaced.")
          path.write_text(text, encoding="utf-8")
          print("Runtime AI proxy config injected into LoveKeyboard extension.")
          PY

      - name: Validate RevenueCat release config
        env:
          REVENUECAT_IOS_PUBLIC_KEY: ${{ secrets.REVENUECAT_IOS_PUBLIC_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          GOOGLE_IOS_CLIENT_ID: ${{ secrets.GOOGLE_IOS_CLIENT_ID }}
          GOOGLE_IOS_REVERSED_CLIENT_ID: ${{ secrets.GOOGLE_IOS_REVERSED_CLIENT_ID }}
        run: |
          if [ -z "$REVENUECAT_IOS_PUBLIC_KEY" ]; then
            echo "REVENUECAT_IOS_PUBLIC_KEY secret is empty; configure the LoveKey RevenueCat app before uploading a build."
            exit 1
          fi
          test -n "$SUPABASE_URL" || {
            echo "Missing SUPABASE_URL GitHub secret" >&2
            exit 1
          }
          test -n "$SUPABASE_ANON_KEY" || {
            echo "Missing SUPABASE_ANON_KEY GitHub secret" >&2
            exit 1
          }
          test -n "$GOOGLE_WEB_CLIENT_ID" || {
            echo "Missing GOOGLE_WEB_CLIENT_ID GitHub secret" >&2
            exit 1
          }
          test -n "$GOOGLE_IOS_CLIENT_ID" || {
            echo "Missing GOOGLE_IOS_CLIENT_ID GitHub secret" >&2
            exit 1
          }
          test -n "$GOOGLE_IOS_REVERSED_CLIENT_ID" || {
            echo "Missing GOOGLE_IOS_REVERSED_CLIENT_ID GitHub secret" >&2
            exit 1
          }

      - name: Inject Google iOS callback scheme
        env:
          GOOGLE_IOS_REVERSED_CLIENT_ID: ${{ secrets.GOOGLE_IOS_REVERSED_CLIENT_ID }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          value = os.environ.get("GOOGLE_IOS_REVERSED_CLIENT_ID", "").strip()
          if not value:
              raise SystemExit("GOOGLE_IOS_REVERSED_CLIENT_ID secret is empty")
          path = Path("ios/Runner/Info.plist")
          text = path.read_text(encoding="utf-8")
          text = text.replace("__GOOGLE_IOS_REVERSED_CLIENT_ID__", value)
          if "__GOOGLE_IOS_REVERSED_CLIENT_ID__" in text:
              raise SystemExit("Google iOS callback placeholder was not replaced")
          path.write_text(text, encoding="utf-8")
          PY

      - name: Setup App Store Connect API Key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" > ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

      - name: Install Codemagic CLI tools
        run: |
          pipx install codemagic-cli-tools

      - name: Setup signing
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          CERTIFICATE_PRIVATE_KEY: ${{ secrets.CERTIFICATE_PRIVATE_KEY }}
        run: |
          export APP_STORE_CONNECT_PRIVATE_KEY=$(cat ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8)

          app-store-connect fetch-signing-files "com.ailovekeyboard.app" \
            --type IOS_APP_STORE \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --certificate-key "$CERTIFICATE_PRIVATE_KEY" \
            --create

          app-store-connect fetch-signing-files "com.ailovekeyboard.app.keyboard" \
            --type IOS_APP_STORE \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --certificate-key "$CERTIFICATE_PRIVATE_KEY" \
            --create

          keychain initialize
          keychain add-certificates
          xcode-project use-profiles --project ios/Runner.xcodeproj --export-options-plist ios/ExportOptions.generated.plist

      - name: Set build number
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          export APP_STORE_CONNECT_PRIVATE_KEY=$(cat ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8)
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "6764681086" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" || echo 0)
          cd ios
          agvtool new-version -all $((LATEST_BUILD + 1))

      - name: Build iOS
        env:
          AI_PROXY_URL: ${{ secrets.AI_PROXY_URL }}
          REVENUECAT_IOS_PUBLIC_KEY: ${{ secrets.REVENUECAT_IOS_PUBLIC_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          GOOGLE_IOS_CLIENT_ID: ${{ secrets.GOOGLE_IOS_CLIENT_ID }}
          FACEBOOK_APP_ID: ${{ secrets.FACEBOOK_APP_ID }}
          ADJUST_APP_TOKEN: ${{ secrets.ADJUST_APP_TOKEN }}
          ADJUST_ENVIRONMENT: ${{ secrets.ADJUST_ENVIRONMENT || 'production' }}
          TIKTOK_PIXEL_ID: ${{ secrets.TIKTOK_PIXEL_ID }}
        run: |
          flutter build ipa \
            --release \
            --dart-define=AI_PROXY_URL="$AI_PROXY_URL" \
            --dart-define=REVENUECAT_IOS_PUBLIC_KEY="$REVENUECAT_IOS_PUBLIC_KEY" \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=GOOGLE_WEB_CLIENT_ID="$GOOGLE_WEB_CLIENT_ID" \
            --dart-define=GOOGLE_IOS_CLIENT_ID="$GOOGLE_IOS_CLIENT_ID" \
            --dart-define=FACEBOOK_APP_ID="$FACEBOOK_APP_ID" \
            --dart-define=ADJUST_APP_TOKEN="$ADJUST_APP_TOKEN" \
            --dart-define=ADJUST_ENVIRONMENT="$ADJUST_ENVIRONMENT" \
            --dart-define=TIKTOK_PIXEL_ID="$TIKTOK_PIXEL_ID" \
            --export-options-plist=ios/ExportOptions.generated.plist

      - name: Validate IPA app and keyboard metadata
        run: |
          python3 - <<'PY'
          import glob
          import plistlib
          import zipfile
          from pathlib import Path

          ipa_paths = glob.glob("build/ios/ipa/*.ipa")
          if len(ipa_paths) != 1:
              raise SystemExit(f"Expected one IPA, found {len(ipa_paths)}")

          ipa_path = Path(ipa_paths[0])
          with zipfile.ZipFile(ipa_path) as archive:
              names = archive.namelist()
              app_plists = [
                  name for name in names
                  if name.startswith("Payload/")
                  and name.count("/") == 2
                  and name.endswith(".app/Info.plist")
              ]
              extension_plists = [
                  name for name in names
                  if "/PlugIns/" in name and name.endswith(".appex/Info.plist")
              ]
              if len(app_plists) != 1 or len(extension_plists) != 1:
                  raise SystemExit(
                      "Expected exactly one app and one keyboard extension plist"
                  )

              app = plistlib.loads(archive.read(app_plists[0]))
              extension = plistlib.loads(archive.read(extension_plists[0]))
              expected = {
                  "app": "com.ailovekeyboard.app",
                  "extension": "com.ailovekeyboard.app.keyboard",
              }
              if app.get("CFBundleIdentifier") != expected["app"]:
                  raise SystemExit("Unexpected app bundle identifier")
              if extension.get("CFBundleIdentifier") != expected["extension"]:
                  raise SystemExit("Unexpected keyboard bundle identifier")

              for key in ("CFBundleShortVersionString", "CFBundleVersion"):
                  if app.get(key) != extension.get(key):
                      raise SystemExit(f"App and keyboard {key} do not match")

              for name in names:
                  if not name.endswith("/") and b"__AI_PROXY_URL__" in archive.read(name):
                      raise SystemExit(f"AI proxy placeholder remains in {name}")

          report = (
              f"ipa={ipa_path.name}\n"
              f"version={app['CFBundleShortVersionString']}\n"
              f"build={app['CFBundleVersion']}\n"
              f"app_bundle={app['CFBundleIdentifier']}\n"
              f"keyboard_bundle={extension['CFBundleIdentifier']}\n"
          )
          Path("build/qa").mkdir(parents=True, exist_ok=True)
          Path("build/qa/ipa-metadata.txt").write_text(report, encoding="utf-8")
          print(report)
          PY

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          export APP_STORE_CONNECT_PRIVATE_KEY=$(cat ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8)
          app-store-connect publish \
            --path build/ios/ipa/*.ipa \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa

      - name: Upload release QA evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-release-qa-${{ github.run_id }}
          if-no-files-found: warn
          path: build/qa/
